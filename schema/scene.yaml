description: "A single scene within an act"

fields:
  scene_number:
    type: int
    required: true
    description: "Scene number within the act"

  scene_setting:
    type: str
    required: true
    description: "Short canonical location tag only (e.g. 'kitchen', 'gym', 'police station'). No atmosphere, no detail"

  characters:
    type: list[str]
    required: true
    description: "Characters present in this scene"

  scene_description:
    type: str
    required: true
    description: "What happens in this scene - the narrative purpose, events in 2-4 concise sentences. This drives both dialogue and narration."

  scene_events:
    type: list
    required: false
    default: []
    description: "Ordered beat-by-beat structural checklist. Each event is an object: {\"beat\": \"...\", \"style\": \"general\"}. Style must match a Writing Style ### subheading from the chapter's style definitions. Default style: general."
