description: "A single scene within an act"

fields:
  scene_number:
    type: int
    required: true
    description: "Scene number within the act"

  scene_setting:
    type: str
    required: true
    description: "Short canonical location tag only (e.g. 'kitchen', 'gym', 'police station'). No atmosphere, no detail"

  characters:
    type: list[str]
    required: true
    description: "Characters present in this scene"

  scene_description:
    type: str
    required: true
    description: "What happens in this scene - the narrative purpose, events in 2-4 concise sentences. This drives both dialogue and narration."

  scene_events:
    type: list
    required: false
    default: []
    description: "Populated lazily before scene generation. Each event is an object: {\"beat\": \"...\", \"style\": \"general\", \"expected_exchanges\": \"2-3\", \"conversation_flow\": [\"step 1\", \"step 2\"]}. expected_exchanges: \"0\", \"1\", \"2-3\", or \"4+\". conversation_flow: array of 2-6 micro-steps for the dialogue arc."
