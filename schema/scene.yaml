description: "A single scene within an act"

fields:
  scene_number:
    type: int
    required: true
    description: "Scene number within the act"

  scene_setting:
    type: str
    required: true
    description: "Short canonical location tag only (e.g. 'kitchen', 'gym', 'police station'). No atmosphere, no detail"

  characters:
    type: list[str]
    required: true
    description: "Characters present in this scene"

  scene_description:
    type: str
    required: true
    description: "What happens in this scene - the narrative purpose, events in 2-4 concise sentences. This drives both dialogue and narration."

  scene_events:
    type: list[str]
    required: false
    default: []
    description: "Ordered beat-by-beat structural checklist. Unlike scene_description (narrative purpose / WHY), this is the WHAT-HAPPENS-NEXT sequence the agents must follow. Simple scenes: 2-4 events. Complex scenes: 4-6 events."