description: "Blueprint skeleton — acts and scenes without scene_events"
fields:
  scene_number:
    type: int
    required: true
    description: "Scene number within the act"
  scene_setting:
    type: str
    required: true
    description: "Short canonical location and optional time tag (e.g. 'kitchen — morning', 'gym — afternoon', 'police station — night'). No atmosphere, no detail"
  characters:
    type: list[str]
    required: true
    description: "Characters present in this scene"
  scene_description:
    type: str
    required: true
    description: "What happens in this scene — narrative purpose and events in 2-4 concise sentences. Must account for how characters arrived here from the previous scene (spatial movement, time passage). Consecutive scenes must form a logical sequence: no teleportation, no unexplained gaps."
